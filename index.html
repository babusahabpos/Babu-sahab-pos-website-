    <script>
      // Crucial shim to prevent "process is not defined" error in the browser
      // This is the main reason for the white screen on Vercel
      window.process = { 
        env: { 
          API_KEY: "" 
        },
        cwd: () => "/"
      };
    </script>
    <style>
        body {

        }

        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .animate-blink {
            animation: blink 0.8s step-end infinite;
        }
    </style>
